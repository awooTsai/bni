<script>
let DATA=null;
const CHAIN_NICK={1:"設計",2:"團購",3:"兒童",4:"幸福",5:"高端",6:"中小",7:"餐飲",8:"業務",9:"新居",10:"新車",11:"食品",12:"行銷",13:"質感",14:"活動",15:"建商",16:"工程",17:"資訊",18:"大健",19:"退休"};
// 星座連線（暗示產業鏈生態交集）
const CHAIN_LINKS=[[1,9],[1,15],[6,11],[6,17],[11,7],[2,5],[3,4],[13,5],[14,12],[12,8],[10,16],[16,15],[18,3],[19,5]];
let WEEKS_INDEX=null,EDM_SCHEDULE=null,CURRENT_WEEK=null;

// 今天以後（含）的場次，由近到遠
function getUpcomingEdms(){
  if(!EDM_SCHEDULE||!EDM_SCHEDULE.schedule)return[];
  const today=new Date().toISOString().split('T')[0];
  return EDM_SCHEDULE.schedule.filter(x=>x.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
}
// 今天以前（不含）的場次，取最後一個（上週）
function getPastEdm(){
  if(!EDM_SCHEDULE||!EDM_SCHEDULE.schedule)return null;
  const today=new Date().toISOString().split('T')[0];
  const past=EDM_SCHEDULE.schedule.filter(x=>x.date<today).sort((a,b)=>a.date.localeCompare(b.date));
  return past.length?past[past.length-1]:null;
}

async function bootstrap(){
  try{
    [WEEKS_INDEX,EDM_SCHEDULE]=await Promise.all([
      fetch('data/weeks-index.json').then(r=>r.json()),
      fetch('data/edm-schedule.json').then(r=>r.json())
    ]);
    renderWeekPicker();
    // 從 URL 取 week，或用最新一週（會員卡用）
    const params=new URLSearchParams(location.search);
    const wk=params.get('week')||WEEKS_INDEX.weeks[0].date;
    await loadWeek(wk);
  }catch(e){
    console.error(e);
    document.getElementById('feat').innerHTML=`<div style="color:#ff6b5b;padding:20px;max-width:700px;background:rgba(255,107,91,.1);border:1px solid #ff6b5b;border-radius:8px;font-family:monospace;line-height:1.8"><b style="font-size:1.1rem">⚠️ 資料載入失敗</b><br><br>錯誤訊息：<br><code style="color:#ffb3aa">${e.message}</code><br><br>請確認這三個 JSON 在 GitHub data/ 資料夾內：<br>• data/weeks-index.json<br>• data/edm-schedule.json<br>• data/2026-04-17.json (或選定週次的 JSON)</div>`;
  }
}

async function loadWeek(date){
  CURRENT_WEEK=date;
  document.getElementById('wpCurrent').textContent=date;
  // 更新 snapshot banner
  const isLatest=WEEKS_INDEX.weeks[0].date===date;
  const banner=document.getElementById('snapBanner');
  if(!isLatest){
    banner.innerHTML='<b>📅 你正在瀏覽 '+date+' 的歷史快照</b><a onclick="loadWeek(WEEKS_INDEX.weeks[0].date)">回到最新一週 →</a>';
    banner.classList.add('on');
  }else{
    banner.classList.remove('on');
  }
  // 更新 URL 不重新整理
  const u=new URL(location);
  if(isLatest){u.searchParams.delete('week')}else{u.searchParams.set('week',date)}
  history.replaceState({},'',u);
  // 載入該週會員資料
  try{
    const r=await fetch('data/'+date+'.json');
    DATA=await r.json();
    render();
    // 更新下拉選單 highlight
    document.querySelectorAll('.wp-item').forEach(el=>el.classList.toggle('current',el.dataset.date===date));
    closeWP();
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    document.getElementById('chains').innerHTML=`<div style="color:#ff6b5b;padding:40px;text-align:center;font-family:monospace"><b>⚠️ 找不到 data/${date}.json</b><br><br>錯誤：${e.message}<br><br>請確認 GitHub data/ 資料夾有這個檔案</div>`;
  }
}

function renderWeekPicker(){
  const html=WEEKS_INDEX.weeks.map((w,i)=>{
    const latest=i===0?'<span class="latest">最新</span>':'';
    return `<div class="wp-item" data-date="${w.date}" onclick="loadWeek('${w.date}')"><span class="d">${w.date}</span>${latest}<span class="s">${w.speakers_label}</span></div>`;
  }).join('');
  document.getElementById('wpMenu').innerHTML=html;
}

function toggleWP(){document.getElementById('wpMenu').classList.toggle('on')}
function closeWP(){document.getElementById('wpMenu').classList.remove('on')}
document.addEventListener('click',e=>{if(!e.target.closest('.week-picker'))closeWP()});

bootstrap();

function render(){
  // 三組 EDM：上週（已過）/ 本週（即將）/ 下週（預告）
  const upcoming=getUpcomingEdms();
  const pastEdm=getPastEdm();
  const thisWeekEdm=upcoming.length?upcoming[0]:null;
  const nextWeekData=upcoming.length>1?upcoming[1]:null;
  // WEEK OF 顯示本週（即將到來）場次日期
  const wkDisplay=thisWeekEdm?thisWeekEdm.date.replace(/-/g,'.'):DATA['會議日期']?.replace(/-/g,'.')||'';
  document.getElementById('week').textContent='WEEK OF · '+wkDisplay;
  document.getElementById('deckTitle').textContent=(DATA['會議日期']||'').replace(/-/g,'.')+' 本週專業卡牌';
  let featured=thisWeekEdm?thisWeekEdm.speakers:DATA['本週主秀']||DATA.featured||[];
  document.getElementById('feat').innerHTML=featured.map((f,i)=>`<div class="edm-card" onclick="openLbxWeek(${i})" style="cursor:pointer"><img src="${f.edm}" alt="${f.name} ${f.industry}" onerror="this.onerror=null;this.style.cssText='background:linear-gradient(135deg,#1a3458,#0a1f3d);min-height:280px;display:flex;align-items:center;justify-content:center;color:#d4ab5d;font-size:1.1rem;padding:40px;text-align:center';this.src='data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22420%22 height=%22280%22><rect width=%22420%22 height=%22280%22 fill=%22%230a1f3d%22/><text x=%2250%25%22 y=%2245%25%22 text-anchor=%22middle%22 fill=%22%23d4ab5d%22 font-size=%2220%22 font-family=%22serif%22>EDM 圖片未載入</text><text x=%2250%25%22 y=%2260%25%22 text-anchor=%22middle%22 fill=%22%23d4ab5d%22 font-size=%2214%22 opacity=%220.6%22>請確認 GitHub 路徑</text></svg>'"><div class="edm-meta"><div class="t">本週主題簡報・${f.name}</div><div class="s">${f.industry}</div></div></div>`).join('');
  window.__WEEK=featured;
  // 下半屏：上週（左）+ 下週（右）
  const heroNext=document.getElementById('heroNext');
  let nextHtml='<div class="next-inner tri">';
  // 上週
  if(pastEdm&&pastEdm.speakers&&pastEdm.speakers.length){
    const dt=pastEdm.date.replace(/-/g,'.');
    nextHtml+='<div class="tri-col past"><div class="tri-label">上週主題簡報 · '+dt+'</div><div class="tri-grid">'+
      pastEdm.speakers.map((f,i)=>'<div class="next-item" onclick="openLbxPast('+i+')"><img src="'+f.edm+'" alt="'+f.name+'"><div class="cap"><b>'+f.name+'</b>'+f.industry+'</div></div>').join('')+
      '</div></div>';
    window.__PAST=pastEdm.speakers;
  }
  // 下週
  if(nextWeekData&&nextWeekData.speakers&&nextWeekData.speakers.length){
    const dt=(nextWeekData.date||'').replace(/-/g,'.');
    nextHtml+='<div class="tri-col next"><div class="tri-label">下週主題簡報 · '+dt+'</div><div class="tri-grid">'+
      nextWeekData.speakers.map((f,i)=>'<div class="next-item" onclick="openLbx('+i+')"><img src="'+f.edm+'" alt="'+f.name+'"><div class="cap"><b>'+f.name+'</b>'+f.industry+'</div></div>').join('')+
      '</div></div>';
    window.__NEXT=nextWeekData.speakers;
  }
  nextHtml+='</div>';
  heroNext.innerHTML=(pastEdm||nextWeekData)?nextHtml:'';
  const chains={};
  (DATA['會員簡報']||[]).forEach(m=>{const k=m['產業鏈']||'其他';(chains[k]=chains[k]||[]).push(m)});
  const keys=Object.keys(chains).sort((a,b)=>{const na=parseInt((a.match(/第(\d+)/)||[])[1]||99);const nb=parseInt((b.match(/第(\d+)/)||[])[1]||99);return na-nb});
  document.getElementById('chains').innerHTML=keys.map(k=>{
    const mt=k.match(/第(\d+)產業鏈\s*(.+)/);const no=mt?mt[1]:'';const nm=mt?mt[2]:k;
    return `<div class="chain"><div class="chain-head"><span class="chain-no">${no.padStart(2,'0')}</span><h3>${nm}</h3>${chains[k].length>1?'<span class="swipe-hint">左右滑動 <span class="arrow">→</span></span>':''}</div><div class="scroller-wrap"><div class="scroller">${chains[k].map(renderCard).join('')}</div></div></div>`;
  }).join('');
  renderGalaxy(chains);
}

function renderGalaxy(chains){
  const keys=Object.keys(chains).sort((a,b)=>{const na=parseInt((a.match(/第(\d+)/)||[])[1]||99);const nb=parseInt((b.match(/第(\d+)/)||[])[1]||99);return na-nb});
  const cells=keys.map(k=>{const mt=k.match(/第(\d+)/);const no=mt?parseInt(mt[1]):0;const nick=CHAIN_NICK[no]||'';const cnt=chains[k].length;return `<button class="star-btn" data-no="${no}" onclick="jumpChain(${no})"><span class="n">${String(no).padStart(2,'0')}</span><span class="t">${nick}</span><span class="cnt">${cnt} 位</span></button>`}).join('');
  document.getElementById('galaxyGrid').innerHTML=cells;
  // 等 DOM layout 完再畫 SVG 連線
  setTimeout(drawLinks,100);
  window.addEventListener('resize',()=>{clearTimeout(window._rs);window._rs=setTimeout(drawLinks,200)});
}

function drawLinks(){
  const svg=document.getElementById('galaxySvg');if(!svg)return;
  const stage=document.getElementById('galaxyStage');
  const r=stage.getBoundingClientRect();
  svg.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`);
  const pts={};
  document.querySelectorAll('.star-btn').forEach(b=>{const no=b.dataset.no;const br=b.getBoundingClientRect();pts[no]={x:br.left-r.left+br.width/2,y:br.top-r.top+br.height/2}});
  const lines=CHAIN_LINKS.map(([a,b])=>{if(!pts[a]||!pts[b])return '';return `<line x1="${pts[a].x}" y1="${pts[a].y}" x2="${pts[b].x}" y2="${pts[b].y}" stroke="rgba(212,171,93,0.25)" stroke-width="1" stroke-dasharray="3 4"/>`}).join('');
  svg.innerHTML=lines;
}

function jumpChain(no){
  const chains=document.querySelectorAll('.chain');
  chains.forEach(c=>{const h=c.querySelector('.chain-no');if(h&&parseInt(h.textContent)===no){c.scrollIntoView({behavior:'smooth',block:'start'});c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),1600)}});
}

function backToGalaxy(){document.getElementById('galaxy').scrollIntoView({behavior:'smooth'})}

// 滾動監聽顯示回頂鈕
window.addEventListener('scroll',()=>{const bt=document.getElementById('backTop');if(!bt)return;const galaxy=document.getElementById('galaxy');if(!galaxy){bt.classList.remove('on');return}const top=galaxy.getBoundingClientRect().bottom;if(top<0)bt.classList.add('on');else bt.classList.remove('on')});

function renderCard(m){
  const dlg=buildDlg(m);
  const rows=[];
  if(m['會員專業'])rows.push(`<div class="row"><span class="k">專業</span>${esc(m['會員專業'])}</div>`);
  if(m['本週亮點'])rows.push(`<div class="row"><span class="k">亮點</span>${esc(m['本週亮點'])}</div>`);
  if(m['代表性客戶'])rows.push(`<div class="row"><span class="k">代表客戶</span>${esc(m['代表性客戶'])}</div>`);
  if(m['引薦需求'])rows.push(`<div class="row need"><span class="k">引薦需求</span>${esc(m['引薦需求'])}</div>`);
  const dlgHtml=dlg?`<div class="dlg"><div class="dlg-h">💬 開啟引薦對話</div><p>${esc(dlg)}</p></div>`:'';
  const spHtml=m['簡報原文']?`<details class="sp"><summary>📜 簡報原文</summary><p>${esc(m['簡報原文'])}</p></details>`:'';
  const enc=encodeURIComponent(dlg||'');
  return `<div class="card"><div class="name">${esc(m['姓名']||'')}</div><div class="biz">${esc(m['行業別']||'')}</div>${rows.join('')}${dlgHtml}${spHtml}<div class="btns"><button onclick="cpDlg('${enc}')">📋 複製對話</button><button onclick="shareMore('${enc}','${esc(m['姓名']||'')}')" class="more">📤 更多</button></div></div>`;
}

function buildDlg(m){
  const d=m['黃金開啟引薦對話'];if(!d)return '';
  if(typeof d==='string')return d;
  return [d['痛點梗開場'],d['一句話專業'],d['戰績'],d['對應情境']].filter(Boolean).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function cpDlg(enc){const t=decodeURIComponent(enc);navigator.clipboard.writeText(t).then(()=>toast('已複製引薦對話 ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已複製引薦對話 ✓')})}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2000)}

function adaGlitch(el,on){
  if(on){
    const txt=el.getAttribute('data-text');const chars='█▓▒░_';
    el.glitchInterval=setInterval(()=>{
      let s='';for(let i=0;i<txt.length;i++){s+=Math.random()>0.9?chars[Math.floor(Math.random()*chars.length)]:txt[i]}
      el.innerText=s;
    },80);
  }else{
    clearInterval(el.glitchInterval);el.glitchInterval=null;
    el.innerText=el.getAttribute('data-text');
  }
}


function shareMore(enc,name){
  const t=decodeURIComponent(enc);
  if(navigator.share){
    navigator.share({title:'BNI 富真分會・'+name+' 引薦對話',text:t}).catch(()=>{});
  }else{
    // 桌機沒有 Web Share API：退回複製 + 提示
    navigator.clipboard.writeText(t).then(()=>toast('已複製！請手動貼到 FB/IG/其他 ✓')).catch(()=>toast('請長按複製後分享'));
  }
}

function openDeck(){document.getElementById('deck').scrollIntoView({behavior:'smooth'})}
</script>
<button class="back-top" id="backTop" onclick="backToGalaxy()" title="回到產業星系" aria-label="回到產業星系">↑</button>
<div class="lbx" id="lbx" onclick="if(event.target===this)closeLbx()"><button class="lbx-close" onclick="closeLbx()">✕</button><div class="lbx-in"><img id="lbxImg" src=""><div class="lbx-cap" id="lbxCap"></div><div class="lbx-btns"><button onclick="dlEdm()">📥 下載 EDM</button><button class="sec" onclick="shareEdm()">📤 更多分享</button></div></div></div>
<script>
let _LBX=null;
function openLbxPast(i){
  if(!window.__PAST)return;
  showLbx(window.__PAST[i],'上週主題簡報・');
}
function openLbx(i){
  if(!window.__NEXT)return;
  showLbx(window.__NEXT[i],'下週主題簡報・');
}
function openLbxWeek(i){
  if(!window.__WEEK)return;
  showLbx(window.__WEEK[i],'本週主題簡報・');
}
function showLbx(f,prefix){
  _LBX=f;
  document.getElementById('lbxImg').src=f.edm;
  document.getElementById('lbxCap').innerHTML='<b>'+(prefix||'')+f.name+'</b>'+f.industry;
  document.getElementById('lbx').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeLbx(){document.getElementById('lbx').classList.remove('on');document.body.style.overflow='';_LBX=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLbx()});
function dlEdm(){if(!_LBX)return;const a=document.createElement('a');a.href=_LBX.edm;a.download=_LBX.edm.split('/').pop();a.click()}
async function shareEdm(){
  if(!_LBX)return;
  const txt='📅 BNI 富真分會・'+_LBX.name+'｜'+_LBX.industry+'\n'+window.location.href;
  // Tier 1: 嘗試 files
  if(navigator.share&&navigator.canShare){
    try{
      const r=await fetch(_LBX.edm);const b=await r.blob();
      const fn=_LBX.edm.split('/').pop();
      const file=new File([b],fn,{type:b.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text:txt});return;
      }
    }catch(e){}
  }
  // Tier 2: text 分享
  if(navigator.share){
    try{await navigator.share({text:txt});return}catch(e){if(e.name==='AbortError')return}
  }
  // Tier 3: 複製
  try{await navigator.clipboard.writeText(txt);toast('圖片網址已複製，可貼到任何 App ✓')}
  catch(e){toast('請長按圖片另存或複製網址')}
}
</script>
