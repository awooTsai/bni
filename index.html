<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--deep:#06152b;--ink:#0a1f3d;--gold:#d4ab5d;--coral:#ff6b5b;--paper:#f6efe1;--line:#1a3458}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:"Inter","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--deep);color:var(--paper);line-height:1.75;overflow-x:hidden}
h1,h2,h3,h4{font-family:"Noto Serif TC",serif;font-weight:900;letter-spacing:.02em}
.en{font-family:"Bodoni Moda",serif;font-style:italic;font-weight:700}
.hero{position:relative;min-height:100vh;display:flex;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('img/hero-bg.jpg') center/cover;filter:blur(4px) brightness(.4);transform:scale(1.08);z-index:0}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,21,43,.5),rgba(6,21,43,.85))}
.hero-in{position:relative;z-index:2;text-align:center;padding:48px 24px;max-width:1100px;width:100%}
.week{color:var(--gold);font-size:clamp(1rem,2.2vw,1.4rem);letter-spacing:.4em;margin-bottom:28px;opacity:0;transform:translateY(20px);animation:fadeUp .8s .2s forwards}
.week::before,.week::after{content:"—";margin:0 18px;opacity:.5}
/* === hero C 方案 === */
.hero{flex-direction:column;justify-content:flex-start;padding:0}
.hero-top{position:relative;z-index:2;width:100%;flex:0 0 auto;min-height:72vh;display:flex;align-items:center;justify-content:center;padding:48px 24px 32px}
.hero-next{position:relative;z-index:2;width:100%;padding:28px 24px 60px;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.55));border-top:1px solid rgba(212,171,93,.2)}
.next-inner{max-width:95vw;margin:0 auto;text-align:center}
.next-label{font-family:"Bodoni Moda",serif;font-style:italic;color:var(--gold);font-size:clamp(.85rem,1.6vw,1.05rem);letter-spacing:.35em;opacity:.75;margin-bottom:16px}
.next-label::before,.next-label::after{content:"—";margin:0 14px;opacity:.5}
.next-grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.next-item{flex:1 1 380px;max-width:520px;opacity:.7;transition:all .4s ease;cursor:pointer}
.next-item:hover{opacity:1;transform:scale(1.03)}
.next-item img{width:100%;display:block;border-radius:5px;box-shadow:0 12px 32px rgba(0,0,0,.5);border:1px solid rgba(212,171,93,.2)}
.next-item .cap{margin-top:10px;color:var(--paper);opacity:.85;font-size:.92rem;letter-spacing:.02em}
.next-item .cap b{color:var(--gold);font-family:"Noto Serif TC",serif;font-size:1.02rem;margin-right:8px}
@media(max-width:640px){.hero-top{min-height:80vh;padding:32px 20px 24px}.next-item{flex:1 1 100%}}
/* Lightbox */
.lbx{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px)}
.lbx.on{display:flex;animation:fadeIn .3s}
.lbx-in{max-width:95vw;max-height:95vh;display:flex;flex-direction:column;align-items:center;gap:20px}
.lbx img{max-width:95vw;max-height:78vh;object-fit:contain;border-radius:6px;box-shadow:0 24px 80px rgba(0,0,0,.8)}
.lbx-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.lbx-btns button{background:var(--gold);color:var(--deep);border:none;padding:14px 28px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700;font-size:1rem;transition:all .2s}
.lbx-btns button.sec{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.lbx-btns button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,171,93,.4)}
.lbx-close{position:absolute;top:20px;right:24px;background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.3rem;transition:all .2s}
.lbx-close:hover{background:rgba(255,255,255,.15);border-color:#fff}
.lbx-cap{color:var(--paper);text-align:center;font-size:1rem}
.lbx-cap b{color:var(--gold);font-family:"Noto Serif TC",serif;margin-right:10px;font-size:1.1rem}
 /* hero-title */ .hero-title{font-family:"Noto Serif TC",serif;font-size:clamp(1.4rem,3.2vw,2.2rem);font-weight:900;color:var(--paper);margin-bottom:36px;line-height:1.5;opacity:0;transform:translateY(20px);animation:fadeUp .9s .35s forwards;text-shadow:0 2px 20px rgba(0,0,0,.5)} .feat{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.edm-card{position:relative;max-width:420px;width:100%;opacity:0;transform:translateY(20px);animation:fadeUp 1s .5s forwards;transition:transform .4s}
.edm-card:hover{transform:translateY(-6px)}
.edm-card img{width:100%;display:block;border-radius:6px;box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(212,171,93,.3);background:#1a3458;min-height:200px}
.edm-meta{margin-top:16px}
.edm-meta .t{font-family:"Noto Serif TC",serif;font-size:1.25rem;color:var(--gold)}
.edm-meta .s{font-size:.95rem;opacity:.75;margin-top:4px}
.open-btn{margin-top:16px;background:var(--gold);color:var(--deep);border:none;padding:18px 44px;border-radius:4px;font-family:"Noto Serif TC",serif;font-weight:700;font-size:1.15rem;cursor:pointer;letter-spacing:.1em;opacity:0;transform:translateY(20px);animation:fadeUp 1s .9s forwards;position:relative;overflow:hidden}
.open-btn::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:translateX(-100%);animation:shine 3s 2s infinite}
.open-btn:hover{box-shadow:0 12px 28px rgba(212,171,93,.4)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
.scroll-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:.8rem;opacity:.6;letter-spacing:.3em;animation:bounce 2s infinite;z-index:2}
@keyframes bounce{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
.deck{padding:80px 0;display:none}
.deck.on{display:block;animation:fadeIn .6s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}
.deck-head{text-align:center;margin-bottom:48px}
.deck-head .en{color:var(--gold);font-size:1rem;letter-spacing:.3em}
.deck-head h2{font-size:clamp(1.8rem,4vw,2.6rem);margin-top:10px}
.chain{margin-bottom:56px}
.chain-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.chain-no{font-family:"Bodoni Moda",serif;font-style:italic;color:var(--gold);font-size:2.2rem;line-height:1}
.chain-head h3{font-size:1.5rem} .swipe-hint{margin-left:auto;color:var(--gold);font-size:.85rem;opacity:.6;display:flex;align-items:center;gap:6px;animation:swipe 2s ease-in-out infinite} .swipe-hint .arrow{display:inline-block;animation:arrow 1.5s ease-in-out infinite} @keyframes arrow{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}} @keyframes swipe{0%,100%{opacity:.4}50%{opacity:.9}} .scroller-wrap{position:relative} .scroller-wrap::after{content:"";position:absolute;top:0;right:0;width:50px;height:calc(100% - 20px);background:linear-gradient(90deg,transparent,rgba(6,21,43,.8));pointer-events:none;z-index:1} @media(min-width:900px){.swipe-hint{display:none} .scroller-wrap::after{display:none}}
.scroller{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 4px 20px}
.scroller::-webkit-scrollbar{height:6px}
.scroller::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.card{flex:0 0 360px;scroll-snap-align:start;background:linear-gradient(160deg,rgba(26,52,88,.5),rgba(10,31,61,.8));border:1px solid var(--line);border-radius:6px;padding:24px;transition:all .3s}
.card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.card .name{font-family:"Noto Serif TC",serif;font-size:1.35rem;font-weight:900;margin-bottom:4px}
.card .biz{font-size:.95rem;color:var(--gold);margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed rgba(212,171,93,.25)}
.row{margin-bottom:12px;font-size:1rem;line-height:1.65}
.row .k{display:inline-block;font-weight:700;color:var(--gold);font-size:.85rem;letter-spacing:.05em;margin-right:6px}
.row.need{padding:10px 12px;background:rgba(255,107,91,.08);border-left:3px solid var(--coral);border-radius:2px;margin:12px 0}
.row.need .k{color:var(--coral)}
.dlg{margin-top:14px;padding:14px;background:linear-gradient(135deg,rgba(212,171,93,.12),rgba(255,107,91,.06));border:1px solid rgba(212,171,93,.35);border-radius:4px}
.dlg-h{font-family:"Noto Serif TC",serif;color:var(--gold);font-size:1.05rem;font-weight:700;margin-bottom:8px}
.dlg p{font-size:.98rem;line-height:1.85;color:#f0e8d0}
.sp{margin-top:10px;font-size:.85rem}
.sp summary{cursor:pointer;color:var(--gold);opacity:.75;padding:4px 0}
.sp p{padding:10px 12px;background:rgba(0,0,0,.25);border-radius:2px;margin-top:6px;line-height:1.75;font-size:.95rem;opacity:.9}
.btns{display:flex;gap:8px;margin-top:14px}
.btns button{flex:1;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:11px 6px;border-radius:3px;cursor:pointer;font-size:.9rem;font-family:inherit;transition:all .2s;white-space:nowrap} .btns button.more{border-color:rgba(212,171,93,.5);color:rgba(212,171,93,.85)}
.btns button:hover{background:var(--gold);color:var(--deep)}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--deep);padding:14px 28px;border-radius:4px;font-weight:700;box-shadow:0 12px 32px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.on{opacity:1}
.foot{text-align:center;padding:60px 24px;border-top:1px solid var(--line);opacity:.6;font-size:.9rem}
.foot a{color:var(--gold);text-decoration:none} .signature{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;font-family:"Inter","Noto Sans TC",sans-serif;font-size:.9rem;opacity:.85;margin-top:8px}
.signature .awoo-logo img{height:26px;vertical-align:middle;filter:brightness(1.1);transition:filter .3s}
.signature .awoo-logo:hover img{filter:brightness(1.3) drop-shadow(0 0 8px rgba(212,171,93,.5))}
.ada-link{font-family:"Noto Sans TC",sans-serif;font-size:1.1rem;font-weight:700;color:#c8f5ff;text-decoration:none;letter-spacing:1px;padding:5px 6px 3px;border-bottom:2px solid rgba(0,255,255,.4);transition:all .3s ease;display:inline-block;cursor:pointer}
.ada-link:hover{color:#fff;text-shadow:0 0 8px rgba(0,255,255,.9),0 0 20px rgba(0,255,255,.7);border-bottom-color:rgba(0,255,255,.9)}
.sig-tail{opacity:.7;font-size:.85rem}
@media(max-width:640px){.card{flex:0 0 88vw}.week{letter-spacing:.2em}}
</style></head>
<body>

<section class="hero">
<div class="hero-bg"></div>
<div class="hero-top">
<div class="hero-in">
<div class="week en" id="week">WEEK OF · 2026.04.10</div>
<h1 class="hero-title">每週超過 50 位高雄在地業者的<br>專業交流・商機引薦</h1>
<div class="feat" id="feat"></div>
<button class="open-btn" onclick="openDeck()">開啟本週專業卡牌 →</button>
</div>
</div>
<div class="hero-next" id="heroNext"></div>
<div class="scroll-hint">SCROLL</div>
</section>

<section class="deck" id="deck">
<div class="wrap">
<div class="deck-head"><div class="en">BNI FUZHEN · WEEKLY DECK</div><h2 id="deckTitle">本週專業卡牌</h2></div>
<div id="chains"></div>
</div>
<div class="foot"><div style="margin-bottom:14px;font-size:.95rem">BNI 富真分會・高雄・每週五清晨 ｜ <a href="https://line.me/ti/p/8bgrVHyVXQ" target="_blank">加入招集人 LINE</a></div>
<div class="signature">Powered by <a href="https://awoo.ai" target="_blank" class="awoo-logo"><img src="https://lh3.googleusercontent.com/pw/AP1GczMZZWr30_dY1Ke-Bi8Y5xkmHCR6LbpulIszDS4CBY-83hv8qlFlMUYq0BIpRHWnb-ECK73QEhMme3wZrk8MBJFjJ2AYBa13o6MtY0i6yliFbayXMCTZZ5f0kLXkpqh1nv0HMPKvDTGyUN8a_OQhNpkh6A=w451-h159-s-no-gm?authuser=0" alt="awoo 阿物科技官網"></a><a href="https://www.triplew.tw/tsai" target="_blank" data-text="蔡阿達" class="ada-link" onmouseover="adaGlitch(this,true)" onmouseout="adaGlitch(this,false)">蔡阿達</a><span class="sig-tail">| Crafted with Precision and Innovation</span></div></div>
</section>

<div class="toast" id="toast">已複製到剪貼簿 ✓</div>

<script>
let DATA=null;
fetch('data/2026-04-10.json').then(r=>r.json()).then(d=>{DATA=d;render()}).catch(e=>{
  document.getElementById('feat').innerHTML='<div style="color:#ff6b5b;padding:20px;max-width:500px">⚠️ 找不到 data/2026-04-10.json，請確認已上傳到 repo 的 data/ 資料夾</div>';
});

function render(){
  const wk=(DATA['會議日期']||'2026-04-10').replace(/-/g,'.');
  document.getElementById('week').textContent='WEEK OF · '+wk;
  document.getElementById('deckTitle').textContent=wk+' 本週專業卡牌';
  const featured=DATA['本週主秀']||DATA.featured||[{name:'酈瀅鵑',industry:'律師業',edm:'edm/2026-04-10-酈瀅鵑-律師業.jpg'}];
  document.getElementById('feat').innerHTML=featured.map(f=>`<div class="edm-card"><img src="${f.edm}" alt="${f.name} ${f.industry}" onerror="this.onerror=null;this.style.cssText='background:linear-gradient(135deg,#1a3458,#0a1f3d);min-height:280px;display:flex;align-items:center;justify-content:center;color:#d4ab5d;font-size:1.1rem;padding:40px;text-align:center';this.src='data:image/svg+xml;charset=utf-8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22420%22 height=%22280%22><rect width=%22420%22 height=%22280%22 fill=%22%230a1f3d%22/><text x=%2250%25%22 y=%2245%25%22 text-anchor=%22middle%22 fill=%22%23d4ab5d%22 font-size=%2220%22 font-family=%22serif%22>EDM 圖片未載入</text><text x=%2250%25%22 y=%2260%25%22 text-anchor=%22middle%22 fill=%22%23d4ab5d%22 font-size=%2214%22 opacity=%220.6%22>請確認 GitHub 路徑</text></svg>'"><div class="edm-meta"><div class="t">本週主題簡報・${f.name}</div><div class="s">${f.industry}</div></div></div>`).join('');
  // 下週預告
  const nx=DATA['下週預告'];
  if(nx&&nx.主秀&&nx.主秀.length){
    const dt=(nx.日期||'').replace(/-/g,'.');
    const html='<div class="next-inner"><div class="next-label">NEXT FRIDAY · '+dt+'</div><div class="next-grid">'+
      nx.主秀.map((f,i)=>'<div class="next-item" onclick="openLbx('+i+')"><img src="'+f.edm+'" alt="'+f.name+'"><div class="cap"><b>'+f.name+'</b>'+f.industry+'</div></div>').join('')+
      '</div></div>';
    document.getElementById('heroNext').innerHTML=html;
    window.__NEXT=nx.主秀;
  }
  const chains={};
  (DATA['會員簡報']||[]).forEach(m=>{const k=m['產業鏈']||'其他';(chains[k]=chains[k]||[]).push(m)});
  const keys=Object.keys(chains).sort((a,b)=>{const na=parseInt((a.match(/第(\d+)/)||[])[1]||99);const nb=parseInt((b.match(/第(\d+)/)||[])[1]||99);return na-nb});
  document.getElementById('chains').innerHTML=keys.map(k=>{
    const mt=k.match(/第(\d+)產業鏈\s*(.+)/);const no=mt?mt[1]:'';const nm=mt?mt[2]:k;
    return `<div class="chain"><div class="chain-head"><span class="chain-no">${no.padStart(2,'0')}</span><h3>${nm}</h3>${chains[k].length>1?'<span class="swipe-hint">左右滑動 <span class="arrow">→</span></span>':''}</div><div class="scroller-wrap"><div class="scroller">${chains[k].map(renderCard).join('')}</div></div></div>`;
  }).join('');
}

function renderCard(m){
  const dlg=buildDlg(m);
  const rows=[];
  if(m['會員專業'])rows.push(`<div class="row"><span class="k">專業</span>${esc(m['會員專業'])}</div>`);
  if(m['本週亮點'])rows.push(`<div class="row"><span class="k">亮點</span>${esc(m['本週亮點'])}</div>`);
  if(m['代表性客戶'])rows.push(`<div class="row"><span class="k">代表客戶</span>${esc(m['代表性客戶'])}</div>`);
  if(m['引薦需求'])rows.push(`<div class="row need"><span class="k">引薦需求</span>${esc(m['引薦需求'])}</div>`);
  const dlgHtml=dlg?`<div class="dlg"><div class="dlg-h">💬 開啟引薦對話</div><p>${esc(dlg)}</p></div>`:'';
  const spHtml=m['簡報原文']?`<details class="sp"><summary>📜 簡報原文</summary><p>${esc(m['簡報原文'])}</p></details>`:'';
  const enc=encodeURIComponent(dlg||'');
  return `<div class="card"><div class="name">${esc(m['姓名']||'')}</div><div class="biz">${esc(m['行業別']||'')}</div>${rows.join('')}${dlgHtml}${spHtml}<div class="btns"><button onclick="cpDlg('${enc}')">📋 複製對話</button><button onclick="shareLine('${enc}')">💬 LINE</button><button onclick="shareMore('${enc}','${esc(m['姓名']||'')}')" class="more">📤 更多</button></div></div>`;
}

function buildDlg(m){
  const d=m['黃金開啟引薦對話'];if(!d)return '';
  if(typeof d==='string')return d;
  return [d['痛點梗開場'],d['一句話專業'],d['戰績'],d['對應情境']].filter(Boolean).join('');
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function cpDlg(enc){const t=decodeURIComponent(enc);navigator.clipboard.writeText(t).then(()=>toast('已複製引薦對話 ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已複製引薦對話 ✓')})}
function shareLine(enc){const t=decodeURIComponent(enc);window.open('https://social-plugins.line.me/lineit/share?text='+encodeURIComponent(t),'_blank','width=600,height=600')}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2000)}

function adaGlitch(el,on){
  if(on){
    const txt=el.getAttribute('data-text');const chars='█▓▒░_';
    el.glitchInterval=setInterval(()=>{
      let s='';for(let i=0;i<txt.length;i++){s+=Math.random()>0.9?chars[Math.floor(Math.random()*chars.length)]:txt[i]}
      el.innerText=s;
    },80);
  }else{
    clearInterval(el.glitchInterval);el.glitchInterval=null;
    el.innerText=el.getAttribute('data-text');
  }
}


function shareMore(enc,name){
  const t=decodeURIComponent(enc);
  if(navigator.share){
    navigator.share({title:'BNI 富真分會・'+name+' 引薦對話',text:t}).catch(()=>{});
  }else{
    // 桌機沒有 Web Share API：退回複製 + 提示
    navigator.clipboard.writeText(t).then(()=>toast('已複製！請手動貼到 FB/IG/其他 ✓')).catch(()=>toast('請長按複製後分享'));
  }
}

function openDeck(){document.getElementById('deck').classList.add('on');setTimeout(()=>document.getElementById('deck').scrollIntoView({behavior:'smooth'}),50)}
</script>
<div class="lbx" id="lbx" onclick="if(event.target===this)closeLbx()"><button class="lbx-close" onclick="closeLbx()">✕</button><div class="lbx-in"><img id="lbxImg" src=""><div class="lbx-cap" id="lbxCap"></div><div class="lbx-btns"><button onclick="dlEdm()">📥 下載 EDM</button><button class="sec" onclick="shareEdm()">📤 更多分享</button></div></div></div>
<script>
let _LBX=null;
function openLbx(i){
  if(!window.__NEXT)return;
  const f=window.__NEXT[i];_LBX=f;
  document.getElementById('lbxImg').src=f.edm;
  document.getElementById('lbxCap').innerHTML='<b>'+f.name+'</b>'+f.industry;
  document.getElementById('lbx').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeLbx(){document.getElementById('lbx').classList.remove('on');document.body.style.overflow='';_LBX=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLbx()});
function dlEdm(){if(!_LBX)return;const a=document.createElement('a');a.href=_LBX.edm;a.download=_LBX.edm.split('/').pop();a.click()}
async function shareEdm(){
  if(!_LBX)return;
  const txt='📅 BNI 富真分會・下週主題簡報：'+_LBX.name+'｜'+_LBX.industry+'\n'+window.location.href;
  // Tier 1: 嘗試 files
  if(navigator.share&&navigator.canShare){
    try{
      const r=await fetch(_LBX.edm);const b=await r.blob();
      const fn=_LBX.edm.split('/').pop();
      const file=new File([b],fn,{type:b.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text:txt});return;
      }
    }catch(e){}
  }
  // Tier 2: text 分享
  if(navigator.share){
    try{await navigator.share({text:txt});return}catch(e){if(e.name==='AbortError')return}
  }
  // Tier 3: 複製
  try{await navigator.clipboard.writeText(txt);toast('圖片網址已複製，可貼到任何 App ✓')}
  catch(e){toast('請長按圖片另存或複製網址')}
}
</script>
